<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MangaNPK - Đọc Truyện Tranh Online</title>
    <!-- CSS styles link -->
    <link rel="stylesheet" href="css/style.css?v=4.6" />
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="root">
      
      <!-- Global Sticky Header -->
      <header id="global-header" class="glass" style="position: sticky; top: 0; z-index: 1000; transition: all 0.3s ease;">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; height: 70px;">
          
          <!-- Left: Menu + Logo -->
          <div style="display: flex; align-items: center; gap: 15px;">
            <button id="sidebar-toggle-btn" style="color: var(--text-main); display: flex; align-items: center; cursor: pointer; background: none; border: none;" title="Menu">
              <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
            </button>
            <div id="logo-btn" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
              <div style="width: 38px; height: 38px; border-radius: 8px; background-color: #FF8C00; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="book-open" style="width: 20px; height: 20px; color: white;"></i>
              </div>
              <span style="font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-bright);" id="logo-text">
                Manga<span style="color: #FF8C00;">NPK</span>
              </span>
            </div>
          </div>

          <!-- Center: Search Bar -->
          <div style="display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; max-width: 700px; margin: 0 20px;">
            <div id="header-search-container" style="position: relative; width: 100%; max-width: 360px; display: flex; align-items: center;">
              <i data-lucide="search" style="width: 16px; height: 16px; color: var(--text-muted); position: absolute; left: 12px; pointer-events: none;"></i>
              <input
                id="header-search-input"
                type="text"
                placeholder="Tìm kiếm..."
                data-i18n="search.placeholder"
                data-i18n-attr="placeholder"
                class="form-control"
                style="padding-left: 38px; padding-right: 64px; border-radius: 6px; height: 38px; background-color: var(--bg-card); border: 1px solid var(--border-subtle); font-size: 0.85rem; width: 100%;"
              />
              <span style="position: absolute; right: 12px; font-size: 0.7rem; color: var(--text-muted); background-color: var(--border-subtle); padding: 2px 6px; border-radius: 4px; pointer-events: none; font-weight: 600;">
                Ctrl K
              </span>
            </div>
          </div>

          <!-- Right: Language Toggle + User Avatar / Login -->
          <div style="display: flex; align-items: center; gap: 15px;">
            <button id="lang-toggle-btn" class="btn btn-secondary" style="border-radius: 20px; font-weight: 600; padding: 6px 12px; font-size: 0.8rem;">
              EN
            </button>
            <div id="header-user-area" style="display: flex; align-items: center; gap: 15px;">
              <!-- Rendered dynamically via common.js -->
            </div>
          </div>

        </div>
      </header>

      <!-- Sidebar Navigation Drawer Overlay -->
      <div id="sidebar-drawer-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 1010; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;"></div>
      
      <!-- Sidebar Navigation Drawer -->
      <div id="sidebar-drawer" data-use-unified-sidebar="true">
        <!-- Header -->
        <div class="sidebar-header">
          <div style="display: flex; align-items: center; gap: 10px; cursor: pointer;" id="sidebar-logo">
            <div style="width: 32px; height: 32px; border-radius: 6px; background-color: #FF8C00; display: flex; align-items: center; justify-content: center;">
              <i data-lucide="book-open" style="width: 16px; height: 16px; color: white;"></i>
            </div>
            <span style="font-size: 1.2rem; font-weight: 800; color: var(--text-bright);">Manga<span style="color: #FF8C00;">NPK</span></span>
          </div>
          <button id="sidebar-close-btn" style="color: var(--text-bright); cursor: pointer; display: flex; align-items: center;" title="Đóng">
            <i data-lucide="x" style="width: 20px; height: 20px;"></i>
          </button>
        </div>

        <!-- Scrollable content area -->
        <div class="sidebar-content-scroll">
          
          <!-- Home / Feed / Follows Section -->
          <div class="sidebar-menu-section">
            <button id="nav-home-btn" class="sidebar-sub-item active" style="font-weight: 700; padding: 10px 16px; font-size: 0.95rem;">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="home" style="width: 18px; height: 18px;"></i>
                <span data-i18n="nav.home">Trang Chủ</span>
              </span>
            </button>
            
            <button class="sidebar-sub-item" onclick="showToast('Tính năng đang phát triển!')">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="rss" style="width: 18px; height: 18px;"></i>
                <span>Bảng tin</span>
              </span>
              <span class="sidebar-badge-red">Mới</span>
            </button>
            
            <button id="nav-bookmarks-btn" class="sidebar-sub-item">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="bookmark" style="width: 18px; height: 18px;"></i>
                <span>Tủ Sách của Tôi</span>
              </span>
            </button>
            <button id="nav-lists-btn" class="sidebar-sub-item" onclick="window.location.href='/lists.html'">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="list" style="width: 18px; height: 18px;"></i>
                <span data-i18n="nav.lists">Danh sách</span>
              </span>
            </button>
          </div>

          <!-- Section: Titles -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="book-open" style="width: 18px; height: 18px;"></i>
                <span data-i18n="nav.comics">Truyện Tranh</span>
              </span>
              <i data-lucide="plus" style="width: 16px; height: 16px; color: white;"></i>
            </div>
            <div class="sidebar-sub-list">
              <button class="sidebar-sub-item" onclick="document.getElementById('header-search-input').focus();" data-i18n="sidebar.advancedSearch">Tìm kiếm nâng cao</button>
              <button class="sidebar-sub-item" onclick="showToast(t('sidebar.feature', 'Tính năng mới cập nhật!'))" data-i18n="sidebar.newlyUpdated">Mới cập nhật</button>
              <button class="sidebar-sub-item" onclick="showToast(t('sidebar.randomFeature', 'Tính năng ngẫu nhiên!'))" data-i18n="sidebar.random">Ngẫu nhiên</button>
            </div>
          </div>

          <!-- Section: Community -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="users" style="width: 18px; height: 18px;"></i>
                <span data-i18n="nav.community">Cộng đồng</span>
              </span>
            </div>
            <div class="sidebar-sub-list">
              <button class="sidebar-sub-item" onclick="showToast('Diễn đàn đang phát triển!')">Diễn đàn</button>
              <button class="sidebar-sub-item" onclick="showToast('Nhóm dịch đang phát triển!')">Nhóm dịch</button>
            </div>
          </div>

          <!-- Section: MangaNPK info -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="info" style="width: 18px; height: 18px;"></i>
                <span>MangaNPK</span>
              </span>
            </div>
            <div class="sidebar-sub-list">
              <button id="nav-info-btn" class="sidebar-sub-item" data-i18n="nav.about">Giới thiệu</button>
              <button id="nav-admin-btn" class="sidebar-sub-item" style="display: none;" data-i18n="nav.admin">Bảng quản trị</button>
              <button class="sidebar-sub-item" onclick="showToast('Liên hệ: contact@manganpk.com')" data-i18n="nav.contact">Liên hệ</button>
            </div>
          </div>

          <!-- Sticky Sidebar Footer -->
          <div id="sidebar-footer-area">
            <!-- Rendered dynamically via common.js -->
          </div>
        </div>
      </div>

      <!-- Auth Modal -->
      <div id="auth-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 32px; border-radius: var(--radius-lg); position: relative; background-color: var(--bg-card); box-shadow: var(--shadow-lg);" onclick="event.stopPropagation()">
          <button id="auth-modal-close" style="position: absolute; top: 20px; right: 20px; color: var(--text-muted); cursor: pointer;" title="Đóng">
            <i data-lucide="x" style="width: 20px; height: 20px;"></i>
          </button>
          
          <div id="auth-modal-login-view">
            <h3 style="font-size: 1.5rem; font-weight: 800; color: var(--text-bright); margin-bottom: 24px;" data-i18n="auth.login">Đăng Nhập</h3>
            <div id="login-error-message" style="display: none; background-color: rgba(255, 69, 82, 0.15); border: 1px solid rgba(255, 69, 82, 0.3); color: #FF4552; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; align-items: center; gap: 8px;">
              <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink:0;"></i>
              <span class="msg-txt">Sai tài khoản hoặc mật khẩu.</span>
            </div>
            <form id="login-form">
              <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="login-username" class="form-control" placeholder="Nhập tên đăng nhập..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="login-password" class="form-control" placeholder="Nhập mật khẩu..." required />
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 24px; margin-top: 16px; font-weight: 700;" data-i18n="auth.login">Đăng Nhập</button>
            </form>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 24px;">
              Chưa có tài khoản? <span id="switch-to-register" style="color: var(--accent-primary); cursor: pointer; font-weight: 600;">Đăng ký ngay</span>
            </p>
          </div>

          <div id="auth-modal-register-view" style="display: none;">
            <h3 style="font-size: 1.5rem; font-weight: 800; color: var(--text-bright); margin-bottom: 24px;" data-i18n="auth.register">Đăng Ký</h3>
            <div id="register-error-message" style="display: none; background-color: rgba(255, 69, 82, 0.15); border: 1px solid rgba(255, 69, 82, 0.3); color: #FF4552; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; align-items: center; gap: 8px;">
              <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
              <span class="msg-txt">Đăng ký không thành công.</span>
            </div>
            <form id="register-form">
              <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="register-username" class="form-control" placeholder="Tối thiểu 3 ký tự..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="register-password" class="form-control" placeholder="Tối thiểu 6 ký tự..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" id="register-confirm-password" class="form-control" placeholder="Nhập lại mật khẩu..." required />
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 24px; margin-top: 16px; font-weight: 700;" data-i18n="auth.register">Đăng Ký</button>
            </form>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 24px;">
              Đã có tài khoản? <span id="switch-to-login" style="color: var(--accent-primary); cursor: pointer; font-weight: 600;">Đăng nhập</span>
            </p>
          </div>
        </div>
      </div>

      <!-- Main Layout -->
      <main id="main-layout" style="flex: 1; display: flex; flex-direction: column; width: 100%;">
        
        <!-- Featured Slider Section (Edge-to-Edge) -->
        <section style="width: 100%; position: relative; overflow: hidden; background-color: var(--bg-darker); margin-top: -70px; margin-bottom: 30px;">
          <div id="featured-slider-container" style="width: 100%;"></div>
        </section>

        <div class="container" style="position: relative; width: 100%;">

          <!-- Filters Toolbar -->
          <div class="glass-card filter-toolbar" style="padding: 20px 30px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <div style="display: flex; gap: 8px; background-color: var(--bg-darker); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);">
              <button class="type-filter-btn active" data-type="All" style="padding: 8px 18px; border-radius: 4px; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; background-color: var(--accent-primary); color: white;" data-i18n="filter.all">T&#7845;t c&#7843;</button>
              <button class="type-filter-btn" data-type="Manga" style="padding: 8px 18px; border-radius: 4px; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);" data-i18n="filter.typeManga">Manga</button>
              <button class="type-filter-btn" data-type="Manhwa" style="padding: 8px 18px; border-radius: 4px; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);" data-i18n="filter.typeManhwa">Manhwa</button>
              <button class="type-filter-btn" data-type="Manhua" style="padding: 8px 18px; border-radius: 4px; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);" data-i18n="filter.typeManhua">Manhua</button>
            </div>
          </div>

          <!-- Manga Grid List -->
          <div class="header md:overflow-hidden">
            <div class="flex justify-between items-center text-2xl mb-4">
              <h3 class="section-title" data-i18n="section.mangaList">Danh Sách Truyện Tranh</h3>
              <a href="#" class="rounded custom-opacity relative md-btn flex items-center px-3 overflow-hidden accent text rounded-full px-0" aria-label="View full title list" style="min-height: 2.5rem; min-width: 2.5rem; text-decoration: none;">
                <span class="flex relative items-center justify-center font-medium select-none w-full pointer-events-none" style="justify-content: center;">...</span>
              </a>
            </div>

            <div id="manga-loading-placeholder" style="display: none; justify-content: center; align-items: center; padding: 60px 0;">
              <div class="loader"></div>
            </div>

            <div id="manga-swiper" class="swiper manga-swiper swiper-initialized swiper-horizontal fill-width">
              <div class="swiper-wrapper" id="manga-grid-container">
                <!-- Rendered dynamically -->
              </div>
              <div class="swiper-button-next"></div>
              <div class="swiper-button-prev"></div>
              <div class="swiper-pagination"></div>
            </div>
          </div>

          <!-- Latest Updates -->
          <section class="latest-updates-section">
            <div class="flex justify-between items-center text-2xl mb-4">
              <h3 class="section-title" data-i18n="section.latestUpdates">
                <i data-lucide="clock" style="width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-right: 8px;"></i>
                Latest Updates
              </h3>
            </div>
            <div class="latest-updates-panel">
              <div id="latest-updates-container"></div>
            </div>
          </section>

        </div>
      </main>

    </div>

    <!-- Add script links -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/i18n.js?v=1.0"></script>
    <script src="js/common-library.js?v=1.0"></script>
    <script src="js/common-auth.js?v=1.0"></script>
    <script src="js/common.js?v=5.5"></script>
    <script src="js/index.js?v=3.2"></script>
    <style>
      /* Dropdown and animations */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .dropdown-item {
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--text-main);
        cursor: pointer;
        transition: background-color 0.15s, color 0.15s;
      }
      .dropdown-item:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: white;
      }
      .dropdown-item.active {
        color: #fff;
        background-color: var(--accent-primary);
        font-weight: 600;
      }
    </style>
  </body>
</html>
