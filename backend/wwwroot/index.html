<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MangaNPK - Đọc Truyện Tranh Online</title>
    <!-- CSS styles link -->
    <link rel="stylesheet" href="css/style.css?v=3.0" />
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="root">
      
      <!-- Global Sticky Header -->
      <header id="global-header" class="glass" style="position: sticky; top: 0; z-index: 1000; transition: all 0.3s ease;">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; height: 70px;">
          
          <!-- Left: Menu + Logo -->
          <div style="display: flex; align-items: center; gap: 15px;">
            <button id="sidebar-toggle-btn" style="color: var(--text-main); display: flex; align-items: center; cursor: pointer; background: none; border: none;" title="Menu">
              <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
            </button>
            <div id="logo-btn" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
              <div style="width: 38px; height: 38px; border-radius: 8px; background-color: #FF8C00; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="book-open" style="width: 20px; height: 20px; color: white;"></i>
              </div>
              <span style="font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; color: white;">
                Manga<span style="color: #FF8C00;">NPK</span>
              </span>
            </div>
          </div>

          <!-- Center: Search Bar -->
          <div style="display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; max-width: 700px; margin: 0 20px;">
            <div id="header-search-container" style="position: relative; width: 100%; max-width: 360px; display: flex; align-items: center;">
              <i data-lucide="search" style="width: 16px; height: 16px; color: var(--text-muted); position: absolute; left: 12px; pointer-events: none;"></i>
              <input
                id="header-search-input"
                type="text"
                placeholder="Tìm kiếm..."
                class="form-control"
                style="padding-left: 38px; padding-right: 64px; border-radius: 6px; height: 38px; background-color: #1E2026; border: 1px solid #2F333B; font-size: 0.85rem; width: 100%;"
              />
              <span style="position: absolute; right: 12px; font-size: 0.7rem; color: #6E7681; background-color: #2F333B; padding: 2px 6px; border-radius: 4px; pointer-events: none; font-weight: 600;">
                Ctrl K
              </span>
            </div>
          </div>

          <!-- Right: User Avatar / Login -->
          <div id="header-user-area" style="display: flex; align-items: center; gap: 15px;">
            <!-- Rendered dynamically via common.js -->
          </div>

        </div>
      </header>

      <!-- Sidebar Navigation Drawer Overlay -->
      <div id="sidebar-drawer-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 1010; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;"></div>
      
      <!-- Sidebar Navigation Drawer -->
      <div id="sidebar-drawer">
        <!-- Header -->
        <div class="sidebar-header">
          <div style="display: flex; align-items: center; gap: 10px; cursor: pointer;" id="sidebar-logo">
            <div style="width: 32px; height: 32px; border-radius: 6px; background-color: #FF8C00; display: flex; align-items: center; justify-content: center;">
              <i data-lucide="book-open" style="width: 16px; height: 16px; color: white;"></i>
            </div>
            <span style="font-size: 1.2rem; font-weight: 800; color: white;">Manga<span style="color: #FF8C00;">NPK</span></span>
          </div>
          <button id="sidebar-close-btn" style="color: white; cursor: pointer; display: flex; align-items: center;" title="Đóng">
            <i data-lucide="x" style="width: 20px; height: 20px;"></i>
          </button>
        </div>

        <!-- Scrollable content area -->
        <div class="sidebar-content-scroll">
          
          <!-- Home / Feed / Follows Section -->
          <div class="sidebar-menu-section">
            <button id="nav-home-btn" class="sidebar-sub-item active" style="font-weight: 700; padding: 10px 16px; font-size: 0.95rem;">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="home" style="width: 18px; height: 18px;"></i>
                <span>Trang Chủ</span>
              </span>
            </button>
            
            <button class="sidebar-sub-item" onclick="alert('Tính năng đang phát triển!')">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="rss" style="width: 18px; height: 18px;"></i>
                <span>Bảng tin</span>
              </span>
              <span class="sidebar-badge-red">Mới</span>
            </button>
            
            <button id="nav-bookmarks-btn" class="sidebar-sub-item">
              <span style="display: flex; align-items: center; gap: 12px;">
                <i data-lucide="bookmark" style="width: 18px; height: 18px;"></i>
                <span>Tủ Sách của Tôi</span>
              </span>
            </button>
          </div>

          <!-- Section: Titles -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="book-open" style="width: 18px; height: 18px;"></i>
                <span>Truyện Tranh</span>
              </span>
              <i data-lucide="plus" style="width: 16px; height: 16px; color: white;"></i>
            </div>
            <div class="sidebar-sub-list">
              <button class="sidebar-sub-item" onclick="document.getElementById('header-search-input').focus();">Tìm kiếm nâng cao</button>
              <button class="sidebar-sub-item" onclick="alert('Tính năng mới cập nhật!')">Mới cập nhật</button>
              <button class="sidebar-sub-item" onclick="alert('Tính năng ngẫu nhiên!')">Ngẫu nhiên</button>
            </div>
          </div>

          <!-- Section: Community -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="users" style="width: 18px; height: 18px;"></i>
                <span>Cộng đồng</span>
              </span>
            </div>
            <div class="sidebar-sub-list">
              <button class="sidebar-sub-item" onclick="alert('Diễn đàn đang phát triển!')">Diễn đàn</button>
              <button class="sidebar-sub-item" onclick="alert('Nhóm dịch đang phát triển!')">Nhóm dịch</button>
            </div>
          </div>

          <!-- Section: MangaNPK info -->
          <div class="sidebar-menu-section">
            <div class="sidebar-section-title">
              <span class="sidebar-section-title-left">
                <i data-lucide="info" style="width: 18px; height: 18px;"></i>
                <span>MangaNPK</span>
              </span>
            </div>
            <div class="sidebar-sub-list">
              <button id="nav-info-btn" class="sidebar-sub-item">Giới thiệu</button>
              <button id="nav-admin-btn" class="sidebar-sub-item" style="display: none;">Bảng quản trị</button>
              <button class="sidebar-sub-item" onclick="alert('Liên hệ: contact@manganpk.com')">Liên hệ</button>
            </div>
          </div>

          <!-- Sticky Sidebar Footer -->
          <div id="sidebar-footer-area">
            <!-- Rendered dynamically via common.js -->
          </div>
        </div>
      </div>

      <!-- Auth Modal -->
      <div id="auth-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 32px; border-radius: var(--radius-lg); position: relative; background-color: #151A22; box-shadow: var(--shadow-lg);" onclick="event.stopPropagation()">
          <button id="auth-modal-close" style="position: absolute; top: 20px; right: 20px; color: var(--text-muted); cursor: pointer;" title="Đóng">
            <i data-lucide="x" style="width: 20px; height: 20px;"></i>
          </button>
          
          <div id="auth-modal-login-view">
            <h3 style="font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 24px;">Đăng Nhập</h3>
            <div id="login-error-message" style="display: none; background-color: rgba(255, 69, 82, 0.15); border: 1px solid rgba(255, 69, 82, 0.3); color: #FF4552; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; align-items: center; gap: 8px;">
              <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink:0;"></i>
              <span class="msg-txt">Sai tài khoản hoặc mật khẩu.</span>
            </div>
            <form id="login-form">
              <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="login-username" class="form-control" placeholder="Nhập tên đăng nhập..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="login-password" class="form-control" placeholder="Nhập mật khẩu..." required />
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 24px; margin-top: 16px; font-weight: 700;">Đăng Nhập</button>
            </form>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 24px;">
              Chưa có tài khoản? <span id="switch-to-register" style="color: #FF4552; cursor: pointer; font-weight: 600;">Đăng ký ngay</span>
            </p>
          </div>

          <div id="auth-modal-register-view" style="display: none;">
            <h3 style="font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 24px;">Đăng Ký</h3>
            <div id="register-error-message" style="display: none; background-color: rgba(255, 69, 82, 0.15); border: 1px solid rgba(255, 69, 82, 0.3); color: #FF4552; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; align-items: center; gap: 8px;">
              <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
              <span class="msg-txt">Đăng ký không thành công.</span>
            </div>
            <form id="register-form">
              <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="register-username" class="form-control" placeholder="Tối thiểu 3 ký tự..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="register-password" class="form-control" placeholder="Tối thiểu 6 ký tự..." required />
              </div>
              <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" id="register-confirm-password" class="form-control" placeholder="Nhập lại mật khẩu..." required />
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 24px; margin-top: 16px; font-weight: 700;">Đăng Ký</button>
            </form>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 24px;">
              Đã có tài khoản? <span id="switch-to-login" style="color: #FF4552; cursor: pointer; font-weight: 600;">Đăng nhập</span>
            </p>
          </div>
        </div>
      </div>

      <!-- Main Layout -->
      <main id="main-layout" style="flex: 1; display: flex; flex-direction: column; width: 100%;">
        
        <!-- Featured Slider Section (Edge-to-Edge) -->
        <section style="width: 100%; position: relative; overflow: hidden; background-color: #0B0E14; margin-top: -70px; margin-bottom: 30px;">
          <div id="featured-slider-container" style="width: 100%;"></div>
        </section>

        <div class="container" style="position: relative; width: 100%;">

          <!-- Filters Toolbar -->
          <div class="glass-card" style="padding: 16px 24px; border-radius: var(--radius-md); display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 30px;">
            <!-- Type Filter Tabs -->
            <div style="display: flex; gap: 8px; background-color: #0B0E14; padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);">
              <button class="type-filter-btn active" data-type="All" style="padding: 6px 16px; border-radius: 4px; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; background-color: #FF4552; color: white;">
                Tất cả
              </button>
              <button class="type-filter-btn" data-type="Manga" style="padding: 6px 16px; border-radius: 4px; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);">
                Manga
              </button>
              <button class="type-filter-btn" data-type="Manhwa" style="padding: 6px 16px; border-radius: 4px; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);">
                Manhwa
              </button>
              <button class="type-filter-btn" data-type="Manhua" style="padding: 6px 16px; border-radius: 4px; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; background-color: transparent; color: var(--text-muted);">
                Manhua
              </button>
            </div>

            <!-- Genre Dropdown Selector -->
            <div style="position: relative;" id="genre-select-dropdown-container">
              <div id="genre-select-trigger" style="display: flex; align-items: center; gap: 10px; background-color: #1C2330; border: 1px solid #30363D; border-radius: var(--radius-sm); height: 38px; padding: 0 16px; cursor: pointer; user-select: none;">
                <i data-lucide="tag" style="width: 14px; height: 14px; color: var(--text-muted);"></i>
                <span id="current-genre-label" style="font-size: 0.85rem; font-weight: 600;">Thể loại</span>
                <i data-lucide="chevron-left" id="genre-dropdown-chevron" style="width: 14px; height: 14px; transform: rotate(-90deg); color: var(--text-muted); transition: transform 0.2s;"></i>
              </div>
              
              <div id="genre-select-options" style="display: none; position: absolute; top: 44px; right: 0; width: 220px; max-height: 250px; overflow-y: auto; background-color: #1E2026; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); z-index: 100; box-shadow: var(--shadow-md); padding: 4px 0;">
                <div class="dropdown-item active" data-genre-id="null" style="padding: 10px 16px; font-size: 0.85rem; color: var(--text-main); cursor: pointer; font-weight: 600;">Tất cả thể loại</div>
                <div id="genres-list-container">
                  <!-- Loaded dynamically -->
                </div>
              </div>
            </div>
          </div>

          <!-- Manga Grid List -->
          <h3 class="section-title">Danh Sách Truyện Tranh</h3>
          
          <div id="manga-loading-placeholder" style="display: none; justify-content: center; align-items: center; padding: 60px 0;">
            <div class="loader" style="border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #FF4552; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
          </div>

          <div id="manga-grid-container" class="manga-grid">
            <!-- Rendered dynamically -->
          </div>

          <!-- Pagination -->
          <div id="pagination-container" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; margin-bottom: 40px;">
            <button id="prev-page-btn" class="btn btn-secondary" style="border-radius: 20px; padding: 6px 20px; display: flex; align-items: center; gap: 6px;">
              <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i> Trước
            </button>
            <span id="page-number-label" style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">Trang 1 / 1</span>
            <button id="next-page-btn" class="btn btn-secondary" style="border-radius: 20px; padding: 6px 20px; display: flex; align-items: center; gap: 6px;">
              Tiếp <i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i>
            </button>
          </div>

        </div>
      </main>

    </div>

    <!-- Add script links -->
    <script src="js/common.js?v=2.2"></script>
    <script src="js/index.js?v=2.2"></script>
    <style>
      /* Dropdown and animations */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .dropdown-item {
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--text-main);
        cursor: pointer;
        transition: background-color 0.15s, color 0.15s;
      }
      .dropdown-item:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: white;
      }
      .dropdown-item.active {
        color: #FF4552;
        background-color: rgba(255, 69, 82, 0.1);
        font-weight: 600;
      }
    </style>
  </body>
</html>
